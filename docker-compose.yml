version: '3.8'

services:
  roon-dashboard:
    build: .
    container_name: roon-dashboard
    ports:
      - "3001:3001"
      - "80:8080"  # If running nginx inside container
    environment:
      - ROON_CORE_IP=100.90.5.35
      - ROON_CORE_PORT=9100
      - PORT=3001
      - NODE_ENV=production
    volumes:
      - ./roon-dashboard.sqlite:/app/roon-dashboard.sqlite
      - ./roon-dashboard.sqlite-shm:/app/roon-dashboard.sqlite-shm
      - ./roon-dashboard.sqlite-wal:/app/roon-dashboard.sqlite-wal
    restart: unless-stopped
    networks:
      - roon-net

  nginx:
    image: nginx:alpine
    container_name: roon-dashboard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      - roon-dashboard
    restart: unless-stopped
    networks:
      - roon-net

networks:
  roon-net:
    driver: bridge

